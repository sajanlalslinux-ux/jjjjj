<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:10px;
    width:300px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

.input-box{
    margin:15px 0;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#4facfe;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#007bff;
}

.show{
    font-size:12px;
}

.footer{
    text-align:center;
    margin-top:10px;
    font-size:12px;
}
</style>

<script>
function showPassword(){
    var x=document.getElementById("password");
    if(x.type==="password"){
        x.type="text";
    }else{
        x.type="password";
    }
}
</script>

</head>

<body>

<div class="login-box">

<h2>DevOps Login</h2>

<form action="/login" method="POST">

<div class="input-box">
<input type="text" name="username" placeholder="Username" required>
</div>

<div class="input-box">
<input type="password" id="password" name="password" placeholder="Password" required>
</div>

<label class="show">
<input type="checkbox" onclick="showPassword()"> Show Password
</label>

<br><br>

<button type="submit">Login</button>

</form>

<div class="footer">
<p>DevOps Project Login</p>
</div>

</div>

</body>
</html>
