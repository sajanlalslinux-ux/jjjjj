<!DOCTYPE html>
<html>
<head>
<title>Login Page</title>
<style>
body{
    font-family: Arial;
    background: #f2f2f2;
}

.login-box{
    width:300px;
    padding:40px;
    background:white;
    margin:100px auto;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    width:95%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<form>
<input type="text" placeholder="Username" required><br>
<input type="password" placeholder="Password" required><br>

<button type="submit">Login</button>
</form>

</div>

</body>
</html>
